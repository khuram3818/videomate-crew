name: Build VideoMate Crew 3.0 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-v3-${{ runner.os }}-${{ hashFiles('app/buildozer.spec') }}
          restore-keys: buildozer-v3-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip wget openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev cmake lld ccache

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Build APK
        working-directory: app
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
          echo "=== Searching for APK everywhere ==="
          find / -name "*.apk" 2>/dev/null || true
          echo "=== bin folder ==="
          ls -lhR bin/ 2>/dev/null || echo "no bin folder"
          echo "=== buildozer folder ==="
          ls -lhR .buildozer/android/platform/build*/dists/*/bin/ 2>/dev/null || true

      - name: Find and upload APK
        run: |
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          echo "Found APK: $APK"
          cp "$APK" VMC3.0.apk
          ls -lh VMC3.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VMC3.0
          path: VMC3.0.apk
          retention-days: 30
