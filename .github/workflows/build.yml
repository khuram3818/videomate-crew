name: Build VideoMate Crew 3.0 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip wget \
            openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake lld ccache

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('app/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        working-directory: app
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "--- BUILD DONE ---"
          ls -lh bin/ || (echo "No bin/ folder — build failed"; cat build.log | tail -50; exit 1)

      - name: Rename APK
        working-directory: app
        run: |
          APK=$(ls bin/*.apk | head -1)
          cp "$APK" ../VMC3.0.apk
          echo "APK ready: VMC3.0.apk"
          ls -lh ../VMC3.0.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMC3.0
          path: VMC3.0.apk
          retention-days: 30
