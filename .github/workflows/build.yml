name: Build VideoMate Crew 3.0 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK
        working-directory: app
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "=== APK Search ==="
          find . -name "*.apk" 2>/dev/null
          ls -lh bin/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VMC3.0
          path: app/bin/*.apk
          retention-days: 30
